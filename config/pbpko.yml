# PURL configuration for http://purl.obolibrary.org/obo/pbpko
#
# Submit this file (or its contents) as a PR to:
# https://github.com/OBOFoundry/purl.obolibrary.org
# Target path in that repo: config/pbpko.yml

idspace: PBPKO
base_url: /obo/pbpko

products:
- pbpko.owl: https://raw.githubusercontent.com/InSilicoVida-Research-Lab/pbpko/main/Robot/ontologies/pbpko.owl

term_browser: ontobee
example_terms:
- PBPKO_10008

entries:
- exact: /tracker
  replacement: https://github.com/InSilicoVida-Research-Lab/pbpko/issues

- exact: /about
  replacement: https://insilicovida-research-lab.github.io/pbpko/

# Generic dated release redirect (STATO-style)
- prefix: /releases/
  replacement: https://raw.githubusercontent.com/InSilicoVida-Research-Lab/pbpko/releases/
  tests:
  - from: /releases/2026-02-16/pbpko.owl
    to: https://raw.githubusercontent.com/InSilicoVida-Research-Lab/pbpko/releases/2026-02-16/pbpko.owl

# Explicit release entries (add one per official release)
- exact: /releases/2024-07-15/pbpko.owl
  replacement: https://raw.githubusercontent.com/InSilicoVida-Research-Lab/pbpko/releases/2024-07-15/pbpko.owl

